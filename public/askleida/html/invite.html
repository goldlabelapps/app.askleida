<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <title>You have been invited to Leida</title>

    style="margin:0;padding:0;background-color:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1a1a1a;">

    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f4f5;">
        <tr>
            <td align="center" style="padding:40px 16px;">

                <!-- Card -->
                <table width="100%" cellpadding="0" cellspacing="0" border="0"
                    style="max-width:560px;background-color:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e0e0e0;">

                    <!-- Header -->
                    <tr>
                        <td align="center"

                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding:36px 32px 12px 32px;">
                            <h1 style="margin:0 0 8px 0;font-size:22px;font-weight:700;color:#111111;line-height:1.3;">
                                You have been invited
                            </h1>
                            <p style="margin:0 0 28px 0;font-size:15px;color:#555555;line-height:1.6;">
                                Click the button below to accept and set your password
                            </p>

                            <!-- CTA Button -->
                            <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:36px;">
                                <tr>
                                    <td align="center" style="background-color:#2C2C2A;border-radius:8px;">
                                        <a href="{{ .ConfirmationURL }}"
                                            style="display:inline-block;padding:16px 40px;font-size:17px;font-weight:700;color:#ffffff;text-decoration:none;letter-spacing:0.3px;">
                                            Accept Invite
                                        </a>
                                    </td>
                                </tr>
                            </table>

                    
                            <!-- Divider -->
                            <hr style="border:none;border-top:1px solid #e8e8e8;margin:0 0 28px 0;" />

                            <!-- How it works -->
                            
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding:24px 32px;border-top:1px solid #e8e8e8;background-color:#f8f8f8;text-align:center;">
                            <p style="margin:0 0 6px 0;font-size:12px;color:#888888;">
                                <a href="https://goldlabel.pro/nx/nx-admin" style="color:#888888;text-decoration:none;">
                                    Sent using <strong style="color:#555555;">NX°</strong>
                            </a>
                            </p>
                            <p style="margin:0;font-size:12px;color:#aaaaaa;">
                                <a href="https://app.askleida.com"
                                    style="color:#888888;text-decoration:none;">askleida.com</a>
                            </p>

                    </tr>

                </table>
                <!-- /Card -->

            </td>
